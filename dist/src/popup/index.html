<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manga Sync</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: system-ui, -apple-system, sans-serif;
      background: #1a1a2e;
      color: #fff;
    }
    .header {
      padding: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .header h1 {
      font-size: 18px;
      font-weight: 600;
    }
    .content {
      padding: 16px;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px;
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      margin-bottom: 16px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
    }
    .status-dot.inactive { background: #6b7280; }
    .section {
      margin-bottom: 16px;
    }
    .section-title {
      font-size: 12px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      margin-bottom: 8px;
    }
    .adapter-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .adapter-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      background: rgba(255,255,255,0.05);
      border-radius: 6px;
    }
    .adapter-info { display: flex; flex-direction: column; gap: 2px; }
    .adapter-name { font-size: 14px; font-weight: 500; }
    .adapter-site { font-size: 11px; color: rgba(255,255,255,0.5); }
    .toggle {
      width: 40px;
      height: 22px;
      background: rgba(255,255,255,0.2);
      border: none;
      border-radius: 11px;
      cursor: pointer;
      position: relative;
      transition: background 0.2s;
    }
    .toggle.active { background: #6366f1; }
    .toggle::after {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      background: #fff;
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: transform 0.2s;
    }
    .toggle.active::after { transform: translateX(18px); }
    .footer {
      padding: 12px 16px;
      border-top: 1px solid rgba(255,255,255,0.1);
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      text-align: center;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      background: rgba(255,255,255,0.1);
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 13px;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn:hover { background: rgba(255,255,255,0.2); }
  </style>
  <script type="module" crossorigin src="/src/popup/index.js"></script>
  <link rel="modulepreload" crossorigin href="/metadata-parser.js">
</head>
<body>
  <div class="header">
    <h1>Manga Sync</h1>
  </div>
  <div class="content">
    <div class="status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Checking status...</span>
    </div>
    
    <div class="section">
      <div class="section-title">Active Adapters</div>
      <div class="adapter-list" id="adapterList">
        <!-- Populated by JS -->
      </div>
    </div>
    
    <button class="btn" id="importBtn">Import Adapter</button>
    <button class="btn" id="openOptionsBtn">Options</button>
  </div>
  <div class="footer">
    Manga Sync v0.1.0
  </div>
</body>
</html>
